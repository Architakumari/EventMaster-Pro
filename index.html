<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>EventMaster Pro</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script src="https://unpkg.com/lucide@latest"></script>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'Poppins',sans-serif;
            min-height:100vh;
            background:
                radial-gradient(circle at top left,#7c3aed 0%,transparent 30%),
                radial-gradient(circle at bottom right,#ff4d6d 0%,transparent 30%),
                #0f172a;

            color:white;
            overflow:hidden;
        }

        /* NAVBAR */

        .navbar{
            width:100%;
            padding:22px 60px;
            display:flex;
            justify-content:space-between;
            align-items:center;
            position:absolute;
            top:0;
            left:0;
            z-index:10;
        }

        .navbar-brand{
            display:flex;
            align-items:center;
            gap:10px;
            font-size:1.4rem;
            font-weight:700;
            letter-spacing:0.5px;
        }

        .navbar-links{
            display:flex;
            gap:30px;
        }

        .navbar-links a{
            text-decoration:none;
            color:#cbd5e1;
            transition:0.3s;
            font-size:0.95rem;
        }

        .navbar-links a:hover{
            color:white;
        }

        /* HERO */

        .hero-container{
            width:100%;
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:20px;
        }

        .hero{
            width:100%;
            max-width:520px;

            padding:50px 45px;

            border-radius:28px;

            background:rgba(255,255,255,0.08);

            backdrop-filter:blur(18px);

            border:1px solid rgba(255,255,255,0.1);

            box-shadow:
                0 8px 32px rgba(0,0,0,0.35);

            text-align:center;
        }

        .hero-icon{
            width:80px;
            height:80px;
            margin:auto;
            margin-bottom:25px;

            border-radius:20px;

            display:flex;
            align-items:center;
            justify-content:center;

            background:linear-gradient(135deg,#7c3aed,#ff4d6d);

            box-shadow:0 10px 30px rgba(124,58,237,0.4);
        }

        h1{
            font-size:3rem;
            font-weight:700;
            margin-bottom:15px;
            line-height:1.1;
        }

        .gradient-text{
            background:linear-gradient(to right,#c084fc,#ff758f);
            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
        }

        .subtitle{
            color:#cbd5e1;
            font-size:1rem;
            line-height:1.7;
            margin-bottom:35px;
        }

        .btn-group{
            display:flex;
            flex-direction:column;
            gap:18px;
        }

        button{
            border:none;
            cursor:pointer;
            font-size:1rem;
            font-weight:600;

            padding:16px 24px;

            border-radius:16px;

            transition:0.3s ease;

            display:flex;
            align-items:center;
            justify-content:center;
            gap:10px;
        }

        .btn-primary{
            background:linear-gradient(90deg,#7c3aed,#ff4d6d);
            color:white;

            box-shadow:0 10px 25px rgba(124,58,237,0.35);
        }

        .btn-primary:hover{
            transform:translateY(-3px) scale(1.02);

            box-shadow:0 14px 35px rgba(255,77,109,0.4);
        }

        .btn-outline{
            background:transparent;
            color:white;

            border:1px solid rgba(255,255,255,0.2);
        }

        .btn-outline:hover{
            background:rgba(255,255,255,0.08);

            transform:translateY(-3px);
        }

        .footer-text{
            margin-top:30px;
            color:#94a3b8;
            font-size:0.9rem;
        }

        /* RESPONSIVE */

        @media(max-width:768px){

            .navbar{
                padding:20px;
            }

            .navbar-links{
                display:none;
            }

            h1{
                font-size:2.3rem;
            }

            .hero{
                padding:40px 25px;
            }

        }

    </style>
</head>

<body>

    <!-- NAVBAR -->

    <nav class="navbar">

        <div class="navbar-brand">
            <i data-lucide="sparkles"></i>
            EventMaster Pro
        </div>

        <div class="navbar-links">
            <a href="/">Home</a>
            <a href="/booking">Booking</a>
            <a href="/create">Create Event</a>
        </div>

    </nav>

    <!-- HERO SECTION -->

    <div class="hero-container">

        <div class="hero">

            <div class="hero-icon">
                <i data-lucide="calendar-days" size="38"></i>
            </div>

            <h1>
                Build Amazing
                <span class="gradient-text">Events</span>
            </h1>

            <p class="subtitle">
                Manage bookings, create stunning events,
                and monitor everything from one futuristic dashboard.
            </p>

            <div class="btn-group">

                <button class="btn-primary"
                        onclick="location.href='/booking'">

                    <i data-lucide="layout-dashboard" size="20"></i>

                    Open Dashboard
                </button>

                <button class="btn-outline"
                        onclick="location.href='/create'">

                    <i data-lucide="plus-circle" size="20"></i>

                    Create New Event
                </button>

            </div>

            <p class="footer-text">
                Designed for modern event management ✨
            </p>

        </div>

    </div>

    <script>
        lucide.createIcons();
    </script>

</body>
</html>
