<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EventMaster Pro - Dashboard</title>
    <!-- <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"> -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
   <style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;

    background:
    radial-gradient(circle at top left,#7c3aed 0%,transparent 30%),
    radial-gradient(circle at bottom right,#ff4d6d 0%,transparent 30%),
    #0f172a;

    color:white;

    min-height:100vh;
}

/* NAVBAR */

.navbar{
    padding:22px 50px;

    display:flex;
    justify-content:space-between;
    align-items:center;

    background:rgba(255,255,255,0.05);

    backdrop-filter:blur(12px);

    border-bottom:1px solid rgba(255,255,255,0.08);

    position:sticky;
    top:0;
    z-index:100;
}

.navbar-brand{
    font-size:1.4rem;
    font-weight:700;

    display:flex;
    align-items:center;
    gap:10px;
}

.nav-links{
    display:flex;
    gap:30px;
}

.nav-links a{
    color:#cbd5e1;
    text-decoration:none;
    transition:0.3s;
}

.nav-links a:hover,
.nav-links .active{
    color:white;
}

/* BUTTONS */

.btn-create,
.btn-submit-blue{

    background:
    linear-gradient(90deg,#7c3aed,#ff4d6d);

    border:none;

    color:white;

    padding:12px 20px;

    border-radius:14px;

    font-weight:600;

    cursor:pointer;

    transition:0.3s ease;

    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
}

.btn-create:hover,
.btn-submit-blue:hover{
    transform:translateY(-3px);

    box-shadow:
    0 10px 30px rgba(124,58,237,0.4);
}

/* MAIN LAYOUT */

.container{
    max-width:1400px;

    margin:40px auto;

    padding:0 25px;

    display:grid;

    grid-template-columns:2fr 1fr;

    gap:30px;
}

/* PAGE TITLE */

.page-title{
    font-size:2rem;

    margin-bottom:25px;

    font-weight:700;
}

/* STATS */

.stats-grid{
    display:grid;

    grid-template-columns:repeat(2,1fr);

    gap:20px;

    margin-bottom:30px;
}

.stat-box{

    background:rgba(255,255,255,0.08);

    backdrop-filter:blur(14px);

    border:1px solid rgba(255,255,255,0.08);

    padding:24px;

    border-radius:24px;

    transition:0.3s;
}

.stat-box:hover{
    transform:translateY(-5px);
}

.stat-title{
    color:#cbd5e1;

    font-size:0.9rem;

    margin-bottom:12px;
}

.stat-value{
    font-size:2.2rem;

    font-weight:700;

    margin-bottom:15px;
}

.progress-bar{
    width:100%;
    height:10px;

    background:rgba(255,255,255,0.08);

    border-radius:20px;

    overflow:hidden;
}

.progress-fill{
    height:100%;

    background:
    linear-gradient(90deg,#7c3aed,#ff4d6d);

    border-radius:20px;
}

/* EVENT CARDS */

.card{

    background:rgba(255,255,255,0.08);

    backdrop-filter:blur(16px);

    border:1px solid rgba(255,255,255,0.08);

    border-radius:24px;

    padding:24px;

    margin-bottom:24px;

    transition:0.3s ease;
}

.card:hover{
    transform:translateY(-5px);

    box-shadow:
    0 15px 35px rgba(0,0,0,0.3);
}

.card-header h3{
    font-size:1.4rem;

    margin-bottom:20px;
}

/* BADGES */

.badge-green{
    background:rgba(16,185,129,0.15);

    border:1px solid rgba(16,185,129,0.3);

    color:#6ee7b7;

    padding:10px 14px;

    border-radius:30px;

    display:flex;
    align-items:center;
    gap:8px;

    font-size:0.9rem;
}

/* ACTION BUTTONS */

.card-actions{
    display:flex;

    gap:12px;

    margin-top:25px;

    flex-wrap:wrap;
}

.btn-outline{

    background:rgba(255,255,255,0.06);

    border:1px solid rgba(255,255,255,0.08);

    color:white;

    padding:10px 16px;

    border-radius:12px;

    cursor:pointer;

    transition:0.3s;

    display:flex;
    align-items:center;
    gap:8px;
}

.btn-outline:hover{
    background:rgba(255,255,255,0.12);
}

.btn-outline-red{
    background:rgba(239,68,68,0.12);

    color:#fca5a5;
}

.btn-promote{
    background:rgba(124,58,237,0.15);

    color:#d8b4fe;
}

/* FORM CARD */

.form-card{

    background:rgba(255,255,255,0.08);

    backdrop-filter:blur(16px);

    border:1px solid rgba(255,255,255,0.08);

    border-radius:24px;

    padding:28px;

    position:sticky;

    top:100px;
}

.form-card h3{
    margin-bottom:25px;

    font-size:1.4rem;
}

.form-group{
    margin-bottom:20px;
}

.form-group label{
    display:block;

    margin-bottom:10px;

    color:#cbd5e1;
}

.form-group input,
.form-group select{

    width:100%;

    padding:14px;

    border:none;

    outline:none;

    border-radius:14px;

    background:rgba(255,255,255,0.08);

    color:white;

    font-size:1rem;
}

/* BOOKINGS */

.list-header{
    margin:35px 0 20px;

    font-size:1.5rem;
}

.list-group{

    background:rgba(255,255,255,0.08);

    backdrop-filter:blur(14px);

    border-radius:24px;

    overflow:hidden;

    border:1px solid rgba(255,255,255,0.08);
}

.list-item{

    padding:20px;

    display:flex;
    justify-content:space-between;
    align-items:center;

    border-bottom:
    1px solid rgba(255,255,255,0.06);
}

.list-item:last-child{
    border-bottom:none;
}

.list-item-text{
    color:#e2e8f0;
}

.list-item-time{
    color:#6ee7b7;

    display:flex;
    align-items:center;
    gap:6px;
}

/* EMPTY */

.empty{
    padding:40px;

    text-align:center;

    color:#cbd5e1;
}

/* RESPONSIVE */

@media(max-width:900px){

    .container{
        grid-template-columns:1fr;
    }

    .stats-grid{
        grid-template-columns:1fr;
    }

    .navbar{
        padding:20px;
    }

    .nav-links{
        display:none;
    }

}

</style>
</head>
<body>

    <nav class="navbar">
        <div class="navbar-brand">
            <i data-lucide="layers"></i> EventMaster Pro
        </div>
        <div class="nav-links">
            <a href="/booking" class="active">Dashboard</a>
            <a href="/">Home Page</a>
        </div>
        <button class="btn-create" onclick="location.href='/create'">
            <i data-lucide="plus" size="18"></i> Create New Event
        </button>
    </nav>

    <div class="container">
        <div>
            <h2 class="page-title">Manage Events Dashboard</h2>
            
            <div class="stats-grid">
                <div class="stat-box">
                    <div class="stat-title">Overall Ticket Sales</div>
                    <div class="stat-value" id="stat-sales">Loading...</div>
                    <div class="progress-bar"><div class="progress-fill"></div></div>
                </div>
                <div class="stat-box">
                    <div class="stat-title">Active Events</div>
                    <div class="stat-value" id="stat-events">Loading...</div>
                    <div class="progress-bar"><div class="progress-fill green"></div></div>
                </div>
            </div>

            <div id="events-container"></div>

            <h3 class="list-header">Recent Bookings Activity</h3>
            <div class="list-group" id="bookings-container"></div>
        </div>

        <div>
            <div class="form-card">
                <h3>Quick Ticket Booking</h3>
                
                <div class="form-group">
                    <label>Guest Name</label>
                    <input type="text" id="b-name" placeholder="">
                </div>
                
                <div class="form-group">
                    <label>Tickets</label>
                    <input type="number" id="b-num" value="1" min="1">
                </div>

                <div class="form-group">
                    <label>Event</label>
                    <select id="b-event">
                        <option value="">Select an event...</option>
                    </select>
                </div>

                <button class="btn-submit-blue" onclick="submitQuickBooking()">
                    <i data-lucide="ticket" size="18"></i> Book Tickets
                </button>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        let allEvents = [];

        async function loadEvents() {
            let res = await fetch('/events');
            allEvents = await res.json();

            let div = document.getElementById('events-container');
            let select = document.getElementById('b-event');
            
            document.getElementById('stat-events').innerText = allEvents.length;
            let totalTickets = 0;

            div.innerHTML = "";
            select.innerHTML = '<option value="">Select an event...</option>';

            if (allEvents.length === 0) {
                div.innerHTML = "<div class='empty'>No events found.</div>";
            }

            allEvents.forEach(e => {
                totalTickets += (e.total_tickets - e.remaining); // Count sold tickets
                
                div.innerHTML += `
                    <div class="card">
                        <div class="card-header">
                            <h3>${e.name}</h3>
                        </div>
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <span class="badge-green">
                                <i data-lucide="ticket" size="14"></i> ${e.remaining} Tickets Remaining
                            </span>
                            <span class="date-info">
                                <i data-lucide="clock" size="14"></i> Date: ${e.date}
                            </span>
                        </div>
                        <div class="card-actions">
                            <button class="btn-outline btn-promote" onclick="promoteEvent('${e.name}')">
                                <i data-lucide="megaphone" size="14"></i> Promote
                            </button>
                            <button class="btn-outline" onclick="editEvent(${e.id}, '${e.name}', '${e.date}', '${e.time}', '${e.venue}', '${e.description}')">
                                <i data-lucide="edit-2" size="14"></i> Edit
                            </button>
                            <button class="btn-outline btn-outline-red" onclick="deleteEvent(${e.id})">
                                <i data-lucide="trash-2" size="14"></i> Delete
                            </button>
                        </div>
                    </div>
                `;

                if(e.remaining > 0) {
                    select.innerHTML += `<option value="${e.id}" data-name="${e.name}" data-remaining="${e.remaining}">${e.name} (${e.remaining} left)</option>`;
                }
            });
            
            document.getElementById('stat-sales').innerText = totalTickets;
            lucide.createIcons();
        }

        function promoteEvent(eventName) {
            alert(`Promo link for "${eventName}" has been copied to your clipboard!\n\nShare it on social media to boost sales.`);
        }

        async function submitQuickBooking() {
            let name = document.getElementById('b-name').value;
            let num = parseInt(document.getElementById('b-num').value);
            let select = document.getElementById('b-event');
            let eventId = select.value;
            
            if (!name || isNaN(num) || num <= 0 || !eventId) {
                alert("Please fill out the name, a valid number of tickets, and select an event.");
                return;
            }

            let selectedOption = select.options[select.selectedIndex];
            let eventName = selectedOption.getAttribute('data-name');
            let remaining = parseInt(selectedOption.getAttribute('data-remaining'));

            if (num > remaining) {
                alert(`Sorry, only ${remaining} tickets left for this event.`);
                return;
            }

            let res = await fetch('/tickets', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ event_id: eventId, event: eventName, name: name, num: num })
            });

            if (res.ok) {
                document.getElementById('b-name').value = '';
                document.getElementById('b-num').value = '1';
                document.getElementById('b-event').value = '';
                loadEvents();
                loadTickets();
            } else {
                let data = await res.json();
                alert(data.error || "Booking failed.");
            }
        }

        async function loadTickets() {
            let res = await fetch('/tickets');
            let data = await res.json();
            let div = document.getElementById('bookings-container');
            div.innerHTML = "";

            if (data.length === 0) {
                div.innerHTML = "<div class='empty'>No recent bookings.</div>";
                return;
            }

            data.forEach(t => {
                div.innerHTML += `
                    <div class="list-item">
                        <div class="list-item-text">
                            <strong>${t.name}</strong> booked <strong>${t.num} tickets</strong> for <strong>${t.event}</strong>
                        </div>
                        <div class="list-item-time">
                            <i data-lucide="check-circle" size="14" style="color: #0d9488;"></i> Confirmed
                        </div>
                    </div>
                `;
            });
            lucide.createIcons();
        }

        async function deleteEvent(id) {
            if (!confirm("Delete this event?")) return;
            await fetch('/events/' + id, { method: 'DELETE' });
            loadEvents();
            loadTickets();
        }

        async function editEvent(id, name, date, time, venue, description) {
            let newName = prompt("Edit event name:", name);
            if (!newName) return; 
            
            await fetch('/events/' + id, {
                method: 'PUT',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ name: newName, date: date, time: time, venue: venue, description: description })
            });
            loadEvents();
        }

        loadEvents();
        loadTickets();
    </script>
</body>
</html>
