<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organizer Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #fffbeb, #fef2f2);
            min-height: 100vh;
            padding: 40px 20px;
            color: #1c1917;
            margin: 0;
        }
        .header-container {
            max-width: 1000px;
            margin: 0 auto 40px auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        h1 {
            color: #1c1917;
            font-size: 2.2rem;
            font-weight: 800;
            margin: 0;
        }
        .back-button {
            background: white;
            color: #ec4899;
            border: 2px solid #fbcfe8;
            padding: 12px 24px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 700;
            box-shadow: 0 4px 6px rgba(236, 72, 153, 0.1);
            transition: 0.2s;
        }
        .back-button:hover {
            background: #fdf2f8;
            transform: translateY(-2px);
        }
        .chart-container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(249, 115, 22, 0.08);
            border-top: 5px solid #8b5cf6;
        }
    </style>
</head>
<body>

    <div class="header-container">
        <h1>Organizer Analytics</h1>
        <button class="back-button" onclick="window.location.href='/'">Back to Home</button>
    </div>

    <div class="chart-container">
        <canvas id="ticketChart"></canvas>
    </div>

    <script>
        async function loadChartData() {
            try {
                let res = await fetch('/api/stats');
                let stats = await res.json();

                const ctx = document.getElementById('ticketChart').getContext('2d');
                
                new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: stats.labels,
                        datasets: [{
                            label: 'Tickets Sold',
                            data: stats.data,
                            backgroundColor: 'rgba(236, 72, 153, 0.6)',
                            borderColor: 'rgba(236, 72, 153, 1)',
                            borderWidth: 2,
                            borderRadius: 8
                        }]
                    },
                    options: {
                        responsive: true,
                        plugins: {
                            legend: {
                                display: true,
                                position: 'top',
                            },
                            title: {
                                display: true,
                                text: 'Ticket Sales per Event',
                                font: { size: 18, family: 'Inter' }
                            }
                        },
                        scales: {
                            y: {
                                beginAtZero: true,
                                ticks: { stepSize: 1 }
                            }
                        }
                    }
                });
            } catch (error) {
                console.error("Failed to load chart data:", error);
            }
        }

        loadChartData();
    </script>
</body>
</html>
